<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write Novel - NovelHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">NovelHub</h1>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="#" id="logoutBtn">Logout</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <h2>Write Your Novel</h2>
        
        <form id="novelForm">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" required>
            </div>
            
            <div class="form-group">
                <label for="content">Content</label>
                <textarea id="content" rows="20" required></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary">Publish Novel</button>
        </form>
    </main>

    <script type="module">
        // Import Supabase
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        
        // Initialize Supabase with YOUR credentials
        const supabaseUrl = 'https://ngtarhwkcigbvbjqalbk.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ndGFyaHdrY2lnYnZianFhbGJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MjAzODYsImV4cCI6MjA4ODA5NjM4Nn0.E3eDI6q24BD_DU-HP4fFJ0P_Wo0FbgsVqFx6rvZQN9E';
        const supabase = createClient(supabaseUrl, supabaseKey);
        window.supabase = supabase;
        
        console.log('Supabase initialized');

        // Load auth module
        import('./js/auth.js').then(authModule => {
            window.checkUser = authModule.checkUser;
            window.handleLogout = authModule.handleLogout;
            
            // Check if user is authenticated, redirect to login if not
            authModule.checkUser(true);
            
            // Setup logout button
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    authModule.handleLogout();
                });
            }
        });

        // Load novels module
        import('./js/novels.js').then(novelsModule => {
            window.createNovel = novelsModule.createNovel;
            
            // Attach form submit handler
            const novelForm = document.getElementById('novelForm');
            if (novelForm) {
                novelForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    novelsModule.createNovel(e);
                });
            }
        });
    </script>
</body>
</html>
