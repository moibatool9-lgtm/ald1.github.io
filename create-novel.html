<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write Novel - NovelHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">NovelHub</h1>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="#" id="logoutBtn">Logout</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <h2>Write Your Novel</h2>
        
        <form id="novelForm">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" required>
            </div>
            
            <div class="form-group">
                <label for="content">Content</label>
                <textarea id="content" rows="20" required></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary">Publish Novel</button>
        </form>
    </main>

    <!-- Load scripts in correct order -->
    <script type="module">
        // First initialize Supabase
        import './js/supabase-init.js';
        
        // Then load auth and novel modules
        import('./js/auth.js').then(module => {
            window.checkUser = module.checkUser;
            window.handleLogout = module.handleLogout;
            
            // Check if user is logged in
            module.checkUser(true);
            
            // Setup logout button
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    module.handleLogout();
                });
            }
        });
        
        import('./js/novels.js').then(module => {
            window.createNovel = module.createNovel;
            
            // Attach form submit handler
            const novelForm = document.getElementById('novelForm');
            if (novelForm) {
                novelForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    module.createNovel(e);
                });
            }
        });
    </script>

    <!-- At the end of each HTML file, before closing body tag -->
<script type="module">
    // First initialize Supabase
    import './js/supabase-init.js';
    
    // Then load other modules as needed
    import('./js/auth.js').then(module => {
        // Make auth functions available
        window.checkUser = module.checkUser;
        window.handleLogout = module.handleLogout;
        
        // Check user status
        module.checkUser();
    });
    
    // Load page-specific modules
    import('./js/novels.js').then(module => {
        // Make novel functions available
        window.loadNovels = module.loadNovels;
        window.loadMyNovels = module.loadMyNovels;
        window.createNovel = module.createNovel;
        window.loadNovel = module.loadNovel;
        window.incrementLikes = module.incrementLikes;
        window.deleteNovel = module.deleteNovel;
        
        // Call page-specific functions
        if (document.getElementById('novelsList')) {
            module.loadNovels();
        }
        if (document.getElementById('myNovelsList')) {
            module.loadMyNovels();
        }
    });
    
    import('./js/comments.js').then(module => {
        window.loadComments = module.loadComments;
        window.addComment = module.addComment;
    });
</script>
</body>
</html>
